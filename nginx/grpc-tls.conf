# TLS termination для gRPC: клиент → HTTPS (HTTP/2) → nginx → grpc://api-gateway:9090 (plain).
# Сертификаты: полная цепочка и ключ в каталоге, смонтированном в /etc/nginx/certs (см. docker-compose, профиль tls).

server {
    listen 443 ssl http2;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # gRPC через HTTP/2
    location / {
        grpc_pass grpc://api-gateway:9090;
        grpc_set_header Host $host;
    }
}
