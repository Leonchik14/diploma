server {
    listen 443 ssl;
    http2 on;

    server_name api.interprep.ru;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── gRPC-Web (для iOS симулятора) ──
    # Запросы с Content-Type: application/grpc-web идут в Envoy
    location /grpc-web/ {
        rewrite ^/grpc-web/(.*) /$1 break;

        proxy_pass http://envoy-grpc-web:8081;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "content-type,x-grpc-web,x-user-agent,authorization,grpc-timeout" always;
        add_header Access-Control-Expose-Headers "grpc-status,grpc-message" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Обычный gRPC (для реальных устройств) ──
    location / {
        grpc_pass grpc://api-gateway:9090;
        grpc_set_header Host $host;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;

        error_page 502 = /error502grpc;
    }

    location = /error502grpc {
        internal;
        default_type application/grpc;
        add_header grpc-status 14;
        add_header grpc-message "unavailable";
        return 204;
    }
}